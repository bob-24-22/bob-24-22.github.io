<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link href="https://fonts.googleapis.com/css2?family=Merienda&family=Quicksand&display=swap" rel="stylesheet">
  <title>bubba's birthday <3</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container" id="countdown-container">
    <h1>🎈🎈 Bubba's Birthday 🎈🎈 </h1>
    <button id="unlockBtn" onclick="unlockAudio()">💖 click me if u love me 💖</button>

    <div class="countdown-frame">
      <div class="top-row">
        <img src="img1.jpg" class="frame-img" />
        <img src="img2.jpg" class="frame-img" />
      </div>
  
      <div class="middle-row">
        <img src="img3.jpg" class="frame-img" />
        <div id="countdown" class="big-countdown"></div>
        <img src="img4.jpg" class="frame-img" />
      </div>
  
      <div class="bottom-row">
      <img src="img5.jpg" class="frame-img" />
      <img src="img6.jpg" class="frame-img" />
      <img src="img7.jpg" class="frame-img" />
    </div>
  </div>
</div>
  
  

  <div class="container hidden" id="main-content">
    <h1>HAPPPY BIRTHDAY CUTIE BABYYY!!!</h1>
    <h1>It's a Love jar :)</h1>
    <h2><i>filled with notes for you😘</i></h2>
    <p><small>Tap on the jar for surprises!!👀 (pls be slow..hehe😅)</small></p>

    <div class="jar-wrapper" onclick="showNote()">
      <img src="jar.png" alt="Jar" class="jar" />
    </div>

    <div class="note" id="note">You're my favorite notification 💬</div>
    <p id="counter" class="counter-text"></p>
  </div>

  <audio id="romantic-music" src="b_audio.mp3" preload="auto"></audio>
  <audio id="second-song" preload="auto">
    <source src="d_audio.mp3" type="audio/mpeg">
  </audio>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.3.3"></script>
  <script src="script.js"></script>
</body>
</html>
